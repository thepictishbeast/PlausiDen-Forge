name: supply-chain

# T67: supply chain hardening.
#
# Runs the supply-chain gate on every push + a scheduled weekly
# deep scan. Refuses builds that:
#   * have an open RustSec advisory in any transitive dep
#     (cargo-deny advisories)
#   * pull a non-allowlisted license (cargo-deny licenses)
#   * pull a banned / wildcard-versioned / non-registry crate
#     (cargo-deny bans + sources)
#
# Additional jobs:
#   * cargo-audit — separate run of the RustSec advisory DB
#                   (defense in depth; covers the case where
#                   cargo-deny's snapshot is stale)
#   * cargo-cyclonedx — emits a CycloneDX 1.5 SBOM for downstream
#                   compliance use
#   * GitHub artifact-attestation — SLSA-style build provenance for
#                   workflow-produced artifacts
#
# Config:
#   deny.toml at workspace root drives the cargo-deny gate.

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/*/Cargo.toml"
      - "deny.toml"
      - ".github/workflows/supply-chain.yml"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/*/Cargo.toml"
      - "deny.toml"
      - ".github/workflows/supply-chain.yml"
  # Weekly deep scan even if no deps changed — catches new
  # advisories published against existing pinned versions.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read
  # SLSA artifact-attestation requires id-token + attestations
  # write scopes. Only the SBOM job uses them.
  id-token: write
  attestations: write

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (T74 SHA pin)
        with:
          persist-credentials: false

      - name: Install rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo-deny binary
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0 (T74 SHA pin)
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-${{ runner.os }}-0.18

      - name: Install cargo-deny
        run: |
          if [ ! -x ~/.cargo/bin/cargo-deny ]; then
            cargo install --locked --version "^0.18" cargo-deny
          fi

      - name: Run cargo deny check
        run: cargo deny --workspace check

  cargo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Upstream blocker: cargo-audit 0.21.x (current latest) uses
    # cvss-rs which does not yet support CVSS 4.0. RustSec started
    # publishing CVSS 4.0 advisories in 2026 (e.g. RUSTSEC-2026-0076
    # libcrux-ml-dsa), and cargo-audit refuses to load the database
    # when any advisory uses CVSS 4.0. cargo-deny's [advisories]
    # check provides equivalent coverage via the same RustSec
    # advisory-db, so we surface cargo-audit's findings without
    # gating the workflow on its parser limitation. Re-enable when
    # cargo-audit / cvss-rs ship CVSS 4.0 support upstream.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (T74 SHA pin)
        with:
          persist-credentials: false

      - name: Install rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo-audit binary
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0 (T74 SHA pin)
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-0.21

      - name: Install cargo-audit
        run: |
          if [ ! -x ~/.cargo/bin/cargo-audit ]; then
            cargo install --locked --version "^0.21" cargo-audit
          fi

      - name: Run cargo audit
        run: cargo audit --deny warnings

  sbom-cyclonedx:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (T74 SHA pin)
        with:
          persist-credentials: false

      - name: Install rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo-cyclonedx binary
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0 (T74 SHA pin)
        with:
          path: ~/.cargo/bin/cargo-cyclonedx
          key: cargo-cyclonedx-${{ runner.os }}-0.5

      - name: Install cargo-cyclonedx
        run: |
          if [ ! -x ~/.cargo/bin/cargo-cyclonedx ]; then
            cargo install --locked --version "^0.5" cargo-cyclonedx
          fi

      - name: Emit CycloneDX 1.5 SBOM
        # With `--all`, cargo-cyclonedx writes one SBOM per
        # workspace member into each crate's own directory (e.g.
        # `crates/forge-cli/sbom-forge.cdx.json`). The earlier
        # `path: "*.cdx.json"` glob only checked the repo root,
        # so upload-artifact found nothing + the SLSA attest
        # step was skipped silently. Discover files anywhere in
        # the tree + log them so the workflow can't fail-quiet
        # again.
        run: |
          cargo cyclonedx --format json --spec-version 1.5 \
            --all --override-filename sbom-forge.cdx
          echo "--- SBOMs emitted ---"
          find . -name "sbom-forge.cdx.json" -not -path "./target/*" -ls
          count=$(find . -name "sbom-forge.cdx.json" -not -path "./target/*" | wc -l)
          echo "--- total: ${count} ---"
          # Fail loudly rather than silently if cargo-cyclonedx
          # produced nothing.
          test "${count}" -gt 0

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0 (T74 SHA pin)
        with:
          name: sbom-forge-cyclonedx
          path: "**/sbom-forge.cdx.json"
          if-no-files-found: error
          retention-days: 90

      - name: Attest SBOM provenance (SLSA-style)
        # Generates a sigstore-signed attestation tying every
        # per-crate SBOM artifact to this workflow run. Verifiable
        # via:
        #   gh attestation verify <sbom>.json \
        #       --repo thepictishbeast/PlausiDen-Forge
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0 (T74 SHA pin)
        if: ${{ hashFiles('**/sbom-forge.cdx.json') != '' }}
        with:
          subject-path: "**/sbom-forge.cdx.json"
