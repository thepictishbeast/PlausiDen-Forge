name: forge-audit

# T15: every push to PlausiDen-Forge must pass forge build (zero
# strict findings) AND the Crawler audit against skillshots-poc
# (zero NEW regressions across all 8 detection axes). Reports
# upload as artifacts so the diff vs prior run is reviewable.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: forge build + crawler diff
    runs-on: ubuntu-latest
    steps:
      - name: checkout-forge
        uses: actions/checkout@v4

      - name: checkout-crawler
        uses: actions/checkout@v4
        with:
          repository: thepictishbeast/PlausiDen-Crawler
          # 2026-05-17: main and master have converged (#665 close).
          # Either works; main is the active dev branch per AVP §8b.
          ref: main
          path: _crawler

      - name: checkout-loom
        uses: actions/checkout@v4
        with:
          repository: thepictishbeast/PlausiDen-Loom
          ref: main
          path: _loom

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: setup-rust
        uses: dtolnay/rust-toolchain@stable

      # --------------------------------------------------------
      # 1. Forge build: every detection phase strict-clean.
      #    bash forge.sh was retired (T54 2026-05-06). The Rust
      #    forge-cli is now canonical; this step builds it with
      #    --release (fast) and runs `forge build` in PoC mode
      #    (default) so warnings are advisory and only strict
      #    findings can fail the audit.
      # --------------------------------------------------------
      - name: build-loom-cli
        # Forge's validate_cms + theme_contrast phases shell out to the
        # `loom` binary. Build it from the sibling _loom checkout and
        # export LOOM_BIN so Forge picks it up.
        working-directory: _loom
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo build --release -p loom-cli --locked --verbose
          echo "LOOM_BIN=$PWD/target/release/loom" >> "$GITHUB_ENV"

      - name: forge-build
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: info
        run: |
          cargo build --release -p forge-cli --locked --verbose
          ./target/release/forge build
          # forge-cli exits non-zero on strict findings; failure
          # here blocks the audit before crawler even runs.

      # --------------------------------------------------------
      # 2. Crawler deps + Playwright browsers.
      # --------------------------------------------------------
      - name: crawler-install
        working-directory: _crawler
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      # --------------------------------------------------------
      # 3. Start serve.py + run mobile + desktop journeys.
      # --------------------------------------------------------
      - name: serve-skillshots
        run: |
          python3 serve.py --port 8123 > /tmp/serve.log 2>&1 &
          # Wait for port to bind (up to 10s).
          for i in $(seq 1 20); do
            if curl -fsSo /dev/null http://127.0.0.1:8123/; then
              echo "[ci] serve.py is up"; break
            fi
            sleep 0.5
          done

      - name: crawler-audit-mobile
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-mobile.json
          # Will exit non-zero if any axis regressed.

      - name: crawler-audit-tablet
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-tablet.json

      - name: crawler-audit-desktop
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc.json --viewport 1280x800

      - name: crawler-audit-ultrawide
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-ultrawide.json

      - name: crawler-audit-themes
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-themes.json

      - name: crawler-audit-fonts
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-fonts.json

      - name: crawler-audit-densities
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-densities.json

      - name: crawler-audit-throttled
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-throttled.json

      - name: crawler-audit-zoom-200
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-zoom-200.json

      - name: crawler-audit-first-time
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-first-time.json

      - name: crawler-audit-keyboard
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-keyboard.json

      - name: crawler-audit-screen-reader
        working-directory: _crawler
        run: |
          npm run audit -- --journey journeys/skillshots-poc-screen-reader.json

      # --------------------------------------------------------
      # 4. Upload reports + screenshots so the diff is reviewable
      #    even when the run was green.
      # --------------------------------------------------------
      - name: upload-forge-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-report
          path: |
            reports/build-*.json
            reports/latest.json
          if-no-files-found: warn

      - name: upload-crawler-runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-runs
          path: _crawler/runs/
          if-no-files-found: warn
          retention-days: 7
