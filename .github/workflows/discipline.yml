name: discipline

# T92 + T96: super-society discipline gate (STRICT mode).
#
# Per `super-society-tech-stack`, every PlausiDen-Forge crate scores
# on six axes simultaneously: fast + reliable + robust + secure +
# anonymous + private. This workflow runs `scripts/discipline-
# check.sh --strict` against the workspace on every push + PR.
#
# Currently in *strict* mode: any violation gates the workflow.
# (Advisory mode used through T96; flipped to strict in 9c7053d
# after forge-cli / forge-core / forge-phases / forge-replay /
# forge-serve all landed their forbid(unsafe_code) +
# deny(missing_docs) + tests.)
#
# Adding a new crate that doesn't meet the four axes (secure /
# docs / tests / publish) will fail this gate at PR time.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/discipline-check.sh"
      - ".github/workflows/discipline.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "scripts/discipline-check.sh"
      - ".github/workflows/discipline.yml"

permissions:
  contents: read

jobs:
  discipline:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (T74 SHA pin)
        with:
          persist-credentials: false

      - name: Run discipline check (strict)
        run: |
          ./scripts/discipline-check.sh --strict . | tee discipline-summary.json
          # Print the verdict prominently for the action summary.
          echo "## Discipline gate" >>"$GITHUB_STEP_SUMMARY"
          echo '```json' >>"$GITHUB_STEP_SUMMARY"
          cat discipline-summary.json >>"$GITHUB_STEP_SUMMARY"
          echo '```' >>"$GITHUB_STEP_SUMMARY"
