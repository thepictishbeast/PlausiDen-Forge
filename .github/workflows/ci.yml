name: ci

# Rust gates parallel to forge-audit.yml. forge-audit runs the
# full forge build + Crawler journeys against skillshots-poc;
# this workflow handles the cheap fmt / clippy / test / doc gates
# every commit should pass before the heavier audit job runs.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest

    env:
      RUST_BACKTRACE: 1
      RUST_LOG: info
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check --verbose

  clippy:
    name: clippy
    runs-on: ubuntu-latest

    env:
      RUST_BACKTRACE: 1
      RUST_LOG: info
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets --locked --verbose

  test:
    name: test
    runs-on: ubuntu-latest

    env:
      RUST_BACKTRACE: 1
      RUST_LOG: info
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --locked --verbose -- --nocapture

  doc:
    name: doc
    runs-on: ubuntu-latest

    env:
      RUST_BACKTRACE: 1
      RUST_LOG: info
      CARGO_TERM_COLOR: always    # T-doc-debt: re-enable RUSTDOCFLAGS=-D warnings when missing_docs gap closed
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --workspace --no-deps --locked --verbose
