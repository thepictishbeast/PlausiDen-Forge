# Substrate-docs-audit CI gate (#329).
#
# Fails the PR if any public-API item under crates/ lacks a
# `///` doc comment. Suppress false positives with
# `// docs-audit-allow: <reason>` on the declaration line.

name: substrate-docs-audit

on:
  pull_request:
    paths:
      - 'crates/**'
      - '.github/workflows/substrate-docs-audit.yml'
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-audit-${{ hashFiles('**/Cargo.lock') }}
      - name: Build substrate-docs-audit
        run: cargo build -p substrate-docs-audit --release
      - name: Run substrate-docs-audit
        run: ./target/release/substrate-docs-audit crates
