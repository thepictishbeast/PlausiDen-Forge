[package]
name = "substrate-docs-audit"
version = "0.1.0"
edition.workspace = true
description = "Walks substrate .rs files and reports public-API items missing a `///` or `//!` doc comment. Per paul 2026-05-21 (#329)."

[[bin]]
name = "substrate-docs-audit"
path = "src/main.rs"

[dependencies]
anyhow = "1"
walkdir = "2"
