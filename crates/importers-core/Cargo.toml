[package]
name = "importers-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed importer contract — closed ImporterKind enum (WordPress / Webflow / Squarespace / Wix / Ghost / Contentful) projecting source CMS exports into the platform-canonical CmsSection JSON shape via the Importer trait."

[lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde", "serde-well-known", "macros"] }
