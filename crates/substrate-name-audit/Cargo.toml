[package]
name = "substrate-name-audit"
version = "0.1.0"
edition.workspace = true
description = "Walks substrate Rust/TOML/CSS/MD files and reports file:line for any tenant-name leaks. Scans for brand keywords, phone numbers, and street addresses. Per paul 2026-05-21 (#328)."

[[bin]]
name = "substrate-name-audit"
path = "src/main.rs"

[dependencies]
anyhow = "1"
walkdir = "2"
