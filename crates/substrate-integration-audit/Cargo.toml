[package]
name = "substrate-integration-audit"
version = "0.1.0"
edition.workspace = true
description = "Walks substrate Cargo.toml files, builds a crate-name → depends-on graph, and reports any crate with zero incoming dependencies. Per paul 2026-05-21 (#330)."

[[bin]]
name = "substrate-integration-audit"
path = "src/main.rs"

[dependencies]
anyhow = "1"
toml = { version = "0.8", default-features = false, features = ["parse"] }
walkdir = "2"
