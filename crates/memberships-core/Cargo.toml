[package]
name = "memberships-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed memberships + paywall contract — PaywallStrategy (metered / hard / time-based / preview) + Tier + AccessDecision (Allowed / RequiresMembership / RequiresUpgrade / MeterExhausted) for creator-economy + reader-supported content."

[lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde", "serde-well-known", "macros"] }
