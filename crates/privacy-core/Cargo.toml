[package]
name = "privacy-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed privacy-by-design contract — DSAR (GDPR Art. 15-22 / CCPA §1798.100-130) request lifecycle + retention timers + cookie-consent classification (ePrivacy / GDPR / CCPA). Storage + UI live downstream."

[lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = ["serde", "serde-well-known", "macros"] }
