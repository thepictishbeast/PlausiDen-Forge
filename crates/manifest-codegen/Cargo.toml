[package]
name = "manifest-codegen"
version = "0.1.0"
publish = false  # workspace-internal; never published to crates.io
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Build-time projector that turns a PlatformManifest into typed Rust code consumed by downstream crates."

[lints.rust]
unsafe_code = "forbid"
missing_docs = "deny"

[dependencies]
manifest-core = { path = "../manifest-core" }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
