# cargo-deny configuration for PlausiDen-Forge supply-chain
# discipline (task #67).
#
# Run locally:
#   cargo install --locked cargo-deny
#   cargo deny check
#
# CI runs every push via .github/workflows/supply-chain.yml.
#
# Categories the gate enforces:
#   advisories — RustSec security advisories (cargo-audit equivalent)
#   licenses   — allowlist of acceptable open-source licenses
#   bans       — refused crates (deprecated, unmaintained, known-bad)
#   sources    — only crates from the official registry + path deps
#
# Why this matters per super_society_tech_stack: every transitive
# dep is a supply-chain attack surface + a license-compliance risk.
# Explicit allowlist > implicit "whatever cargo pulled".

[graph]
all-features = false
no-default-features = false

# ============================================================
# advisories — RustSec advisory database checks.
# ============================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Refuse to build with ANY known security advisory in the
# transitive dep graph. CI MUST be updated immediately when a
# new advisory lands against a dep we use.
yanked = "deny"
ignore = [
    # No exemptions today; populate with a justification line when
    # a real advisory needs deferral, e.g.:
    # { id = "RUSTSEC-2024-XXXX", reason = "no impact path; see #issue" }
]

# ============================================================
# licenses — license allowlist.
# ============================================================
[licenses]
# Refuse builds with any license outside this allowlist. Operators
# adding a dep must check its license matches one here OR add it
# explicitly with a justification.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "MPL-2.0",        # weak copyleft, file-level only
    "0BSD",
    "BSL-1.0",
    "OpenSSL",        # only as part of dual-license with MIT/Apache
    "AGPL-3.0-or-later", # the platform's own license
]
# Confidence threshold for license auto-detection. Below this
# operators must specify the license explicitly (see
# `exceptions` below).
confidence-threshold = 0.93
exceptions = []
# Explicit per-crate license override when crates.io metadata is
# ambiguous or missing. Operators add entries with a justification.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================
# bans — refused crates.
# ============================================================
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
# Crates we refuse outright. Add entries when a deprecation /
# CVE / supply-chain incident lands.
deny = [
    # { name = "openssl", reason = "platform uses rustls; openssl dep would expose us to OpenSSL CVEs without benefit" },
]
skip = []
skip-tree = []

# ============================================================
# sources — refuse non-registry / non-path deps.
# ============================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
