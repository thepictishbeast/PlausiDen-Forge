\* TLC configuration for PhasePipeline.tla
\* Run: tlc -workers auto PhasePipeline

SPECIFICATION FairSpec

CONSTANTS
    PhaseIds   = {p1, p2, p3, p4}
    MaxFindings = 2

INVARIANTS
    TypeOK
    OrderInvariant
    AbortFreezes
    AtMostOneError
    SealMonotone
    SealingTerminal
    ChainLengthValid
    SafetyAll

PROPERTIES
    EventuallySealed
    SealMonotonicTemporal
    SealOnce

CHECK_DEADLOCK FALSE
\* The spec terminates in state "sealed" with no enabled action —
\* TLC would call that a deadlock under default settings.  We've
\* modeled the seal as terminal, so disable the deadlock check.
