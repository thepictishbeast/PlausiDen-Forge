# backends.toml — declared backend surface for the app.
#
# Forge cross-references this against every interactive element
# in the built HTML. Buttons / links / forms declare the action
# they trigger via:
#
#   <button data-backend="enter-challenge">Enter for $60</button>
#   <a    data-backend="view-challenge">…</a>
#   <form data-backend="post-skill">…</form>
#
# Each `data-backend` value MUST appear as a key under [backends.*]
# below. Forge reports:
#
#   - WIRED:    UI uses a declared backend; backend has impl files.
#   - DECLARED: backend declared but no UI references it (dead spec).
#   - PHANTOM:  UI references undeclared backend (broken UI).
#   - PARTIAL:  backend declared with `impl_files` empty (stub).
#
# Production mode: PHANTOM and PARTIAL are fatal.
# PoC mode:        warns only; visible in the in-browser overlay.

[meta]
project = "SkillShots"
api_base = "https://api.skillshots.com"
schema_version = 1

# ============================================================ *
# AUTH                                                         *
# ============================================================ *
[backends.sign-in]
method   = "POST"
path     = "/auth/sign-in"
purpose  = "operator sign-in"
impl_files = []   # not implemented

[backends.sign-up]
method   = "POST"
path     = "/auth/sign-up"
purpose  = "new operator registration + age-verify gate"
impl_files = []

[backends.sign-out]
method   = "POST"
path     = "/auth/sign-out"
purpose  = "operator sign-out"
impl_files = []

# ============================================================ *
# CHALLENGES                                                   *
# ============================================================ *
[backends.list-challenges]
method   = "GET"
path     = "/challenges"
purpose  = "battle feed list"
impl_files = []

[backends.view-challenge]
method   = "GET"
path     = "/challenges/:id"
purpose  = "open challenge detail (clicked feed card)"
impl_files = []

[backends.post-skill]
method   = "POST"
path     = "/challenges"
purpose  = "operator publishes a new challenge"
impl_files = []

[backends.enter-challenge]
method   = "POST"
path     = "/challenges/:id/entries"
purpose  = "operator pays entry fee + opens upload slot"
impl_files = []

[backends.upload-entry]
method   = "POST"
path     = "/entries/:id/video"
purpose  = "video upload pipeline (S3 multipart)"
impl_files = []

# ============================================================ *
# VOTING                                                       *
# ============================================================ *
[backends.list-open-votes]
method   = "GET"
path     = "/votes"
purpose  = "open-vote queue (sidebar)"
impl_files = []

[backends.cast-vote]
method   = "POST"
path     = "/entries/:id/vote"
purpose  = "operator votes for one entry on a challenge"
impl_files = []

# ============================================================ *
# WALLET / PAYMENTS                                            *
# ============================================================ *
[backends.list-touches]
method   = "GET"
path     = "/wallet"
purpose  = "wallet dashboard (My Wins)"
impl_files = []

[backends.cash-out]
method   = "POST"
path     = "/wallet/cashout"
purpose  = "operator triggers Stripe Connect payout"
impl_files = []

# ============================================================ *
# LEADERBOARD                                                  *
# ============================================================ *
[backends.list-leaderboard]
method   = "GET"
path     = "/leaderboard"
purpose  = "weekly + all-time rankings (Leaderboard page)"
impl_files = []

# ============================================================ *
# PROFILE                                                      *
# ============================================================ *
[backends.view-profile]
method   = "GET"
path     = "/users/:handle"
purpose  = "public profile page"
impl_files = []

[backends.follow]
method   = "POST"
path     = "/users/:handle/follow"
purpose  = "follow/unfollow operator action"
impl_files = []

# ============================================================ *
# REPORTING / SAFETY                                           *
# ============================================================ *
[backends.report-challenge]
method   = "POST"
path     = "/challenges/:id/report"
purpose  = "challenge report → 24h pot freeze + manual review"
impl_files = []

[backends.report-profile]
method   = "POST"
path     = "/users/:handle/report"
purpose  = "profile report → moderation queue"
impl_files = []
